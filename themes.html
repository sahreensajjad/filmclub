<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Themes</title>
</head>

<body>

<header class="nav">
    <h1 class="logo">Film Club 🎬</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Movie List</a>
        <a href="themes.html">Themes</a>
        <a href="leaderboard.html">Leaderboard</a>
    </nav>
</header>

<!-- KEY OVERLAY -->
<div id="key-overlay" style="
    position:fixed; inset:0; background:rgba(0,0,0,0.85);
    display:flex; align-items:center; justify-content:center; z-index:999;">

    <div style="background:#1a1a1a; padding:30px; border-radius:8px; text-align:center; min-width:300px;">
        <h2 style="color:#fff;">Enter Edit Key</h2>

        <input id="key-input" type="password"
            style="width:100%; padding:10px; margin-top:10px;">

        <button onclick="submitKey()"
            style="width:100%; margin-top:10px; padding:10px; background:red; color:white;">
            Unlock
        </button>

        <p id="key-error" style="color:red; display:none;">Wrong key</p>
    </div>
</div>

<section class="row">
    <h2>Themes</h2>
    <div id="table-container">Loading...</div>
</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyi8gzf6WY_BrCIQhd0DOM0qwPP17MjEe2V1BaVxidpo5EvMqgLWjkK38MLFX6zkiFF/exec";
const SHEET_NAME = "Themes";

let WRITE_KEY = null;
let headers = [];
let tableData = [];

/* ---------------- KEY ---------------- */
function submitKey() {
    const key = document.getElementById("key-input").value.trim();

    fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: JSON.stringify({
            sheet: SHEET_NAME,
            action: "verify",
            key
        })
    })
    .then(r => r.text())
    .then(() => {
        WRITE_KEY = key;
        document.getElementById("key-overlay").style.display = "none";
    })
    .catch(() => {
        WRITE_KEY = key;
        document.getElementById("key-overlay").style.display = "none";
    });
}

/* ---------------- LOAD ---------------- */
function loadData() {
    fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_NAME))
    .then(r => r.json())
    .then(data => {

        if (data.rows) {
            tableData = data.rows;
        } else if (Array.isArray(data)) {
            tableData = data.slice(1);
        }

        renderTable();
    });
}

/* ---------------- RENDER ---------------- */
function renderTable() {

    let html = "<table>";

    for (let i = 0; i < tableData.length; i++) {

        const sheetRow = i + 2;
        const value = tableData[i][0] ?? "";

        html += `
            <tr>
                <td contenteditable="true"
                    onblur="saveCell(${sheetRow}, 1, this.innerText)">
                    ${value}
                </td>
            </tr>
        `;
    }

    html += "</table>";

    document.getElementById("table-container").innerHTML = html;
}

/* ---------------- SAVE ---------------- */
function saveCell(row, col, value) {

    fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: JSON.stringify({
            sheet: SHEET_NAME,
            action: "update",
            row,
            col,
            value,
            key: WRITE_KEY
        })
    });
}

/* ---------------- START ---------------- */
loadData();

/* optional light refresh (safe) */
setInterval(loadData, 5000);

</script>

</body>
</html>
