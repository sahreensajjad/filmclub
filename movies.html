<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Movie List</title>
</head>
<body>
<header class="nav">
    <h1 class="logo">MovieClub</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Movie List</a>
        <a href="themes.html">Themes</a>
        <a href="leaderboard.html">Leaderboard</a>
    </nav>
</header>
<section class="row">
    <div class="movie-header">
        <h2>Movie List Editor</h2>
    </div>
    <div id="table-container">Loading...</div>
</section>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyB0ggaTr5iGYZhTZ59YcFXuu6WZTfyNjfd7BE69-WD_zP3qX3MIvLq6MVhpnYV5GtX/exec";
const SHEET_NAME = "Movie List";
const WRITE_KEY = "fLimclub";
const COLS = 6;
let headers = [];
let tableData = [];

/* LOAD DATA */
fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_NAME))
    .then(r => r.json())
    .then(data => {
        console.log("API response:", JSON.stringify(data));

        if (Array.isArray(data)) {
            headers = data[0] || [];
            tableData = data.slice(1);
        } else if (data.headers && data.rows) {
            headers = data.headers;
            tableData = data.rows;
        } else {
            console.error("Unexpected response shape:", data);
        }

        // ✅ Strip trailing empty rows so row numbers stay accurate
        while (tableData.length > 0) {
            const last = tableData[tableData.length - 1];
            if (last.every(cell => cell === "" || cell === null || (typeof cell === "string" && cell.trim() === ""))) {
                tableData.pop();
            } else {
                break;
            }
        }

        console.log("Clean row count:", tableData.length, "— next new row will be sheet row", tableData.length + 2);
        renderTable();
    });

/* RENDER TABLE */
function renderTable() {
    const container = document.getElementById("table-container");

    let html = "<table><tr>";
    for (let i = 0; i < COLS; i++) {
        html += `<th>${headers[i] || ""}</th>`;
    }
    html += "</tr>";

    for (let i = 0; i < tableData.length; i++) {
        html += buildRow(i, i + 2);
    }

    html += buildGhostRow();
    html += "</table>";
    container.innerHTML = html;
}

/* BUILD A DATA ROW */
function buildRow(dataIndex, sheetRow) {
    let html = "<tr>";
    for (let j = 0; j < COLS; j++) {
        const value = tableData[dataIndex]?.[j] ?? "";
        html += `<td contenteditable="true"
            onblur="saveCell(${sheetRow}, ${j + 1}, this.innerText)">${value}</td>`;
    }
    return html + "</tr>";
}

/* BUILD THE EMPTY GHOST ROW */
function buildGhostRow() {
    return `<tr class="ghost-row">${
        Array(COLS).fill(0).map(() =>
            `<td contenteditable="true" oninput="onGhostInput(this)" onblur="onGhostBlur(this)"></td>`
        ).join("")
    }</tr>`;
}

/* FIRES ON FIRST KEYSTROKE — promote row visually only, no sheet write yet */
function onGhostInput(cell) {
    const ghostRow = cell.closest("tr");
    if (!ghostRow.classList.contains("ghost-row")) return;

    ghostRow.classList.remove("ghost-row");

    const newSheetRow = tableData.length + 2;
    tableData.push(Array(COLS).fill(""));
    ghostRow.dataset.sheetRow = newSheetRow;
    ghostRow.dataset.pending = "true";

    console.log("Ghost promoted — will write to sheet row", newSheetRow);

    ghostRow.querySelectorAll("td").forEach((td) => {
        td.removeAttribute("oninput");
    });

    // Add a fresh ghost row below
    const newGhost = document.createElement("tr");
    newGhost.classList.add("ghost-row");
    newGhost.innerHTML = Array(COLS).fill(0).map(() =>
        `<td contenteditable="true" oninput="onGhostInput(this)" onblur="onGhostBlur(this)"></td>`
    ).join("");
    ghostRow.closest("table").appendChild(newGhost);
}

/* FIRES WHEN USER LEAVES A CELL IN A PROMOTED ROW */
function onGhostBlur(cell) {
    const row = cell.closest("tr");
    if (!row.dataset.sheetRow) return;

    const sheetRow = parseInt(row.dataset.sheetRow);
    const col = Array.from(row.children).indexOf(cell) + 1;
    const value = cell.innerText.trim();

    if (row.dataset.pending === "true") {
        row.dataset.pending = "false";

        // Re-wire all cells to normal saveCell immediately
        row.querySelectorAll("td").forEach((td, j) => {
            td.removeAttribute("onblur");
            td.setAttribute("onblur", `saveCell(${sheetRow}, ${j + 1}, this.innerText)`);
        });

        // ✅ addRow first, then save cell — but handle non-JSON "ok" response gracefully
        postToSheet({ sheet: SHEET_NAME, action: "addRow", key: WRITE_KEY })
            .then(() => {
                if (value) {
                    console.log("addRow done, now saving cell — row:", sheetRow, "col:", col, "value:", value);
                    saveCell(sheetRow, col, value);
                }
            });
    } else {
        if (value) saveCell(sheetRow, col, value);
    }
}

/* SAVE CELL */
function saveCell(row, col, value) {
    console.log("saveCell — row:", row, "col:", col, "value:", value);
    postToSheet({
        sheet: SHEET_NAME,
        action: "update",
        row: row,
        col: col,
        value: value,
        key: WRITE_KEY
    });
}

/* CENTRAL POST HELPER — handles both JSON and plain text responses */
function postToSheet(body) {
    return fetch(API_URL, {
        method: "POST",
        redirect: "follow",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(body)
    })
    .then(r => r.text()) // ✅ Use text() not json() — GAS sometimes returns plain "ok"
    .then(text => {
        console.log("POST raw response:", text);
        try {
            const res = JSON.parse(text);
            if (res.error) console.error("Sheet error:", res.error);
        } catch(e) {
            // Plain text response like "ok" is fine, just log it
            console.log("POST response (plain text):", text);
        }
    })
    .catch(err => console.error("POST failed:", err));
}
</script>
</body>
</html>
