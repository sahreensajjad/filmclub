<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Movie List</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="themes.html">Themes</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<section class="row">

  <div class="movie-header">
    <h2>Movie List Editor</h2>
  </div>

  <div id="table-container">Loading...</div>

</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyB0ggaTr5iGYZhTZ59YcFXuu6L2ZXCHNXgNG0xKm5G10TR-2btX1YSm0-Qisi7xVr/exec";
const SHEET_NAME = "Movie List";

let headers = [];
let tableData = [];

/* LOAD DATA (FIXED SAFE VERSION) */
fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_NAME))
.then(r => r.json())
.then(data => {

    // ✅ works for BOTH response formats
    headers = data.headers || data[0] || [];
    tableData = data.rows || data.slice(1) || [];

    renderTable();
})
.catch(err => {
    console.error(err);
    document.getElementById("table-container").innerHTML = "Error loading data";
});


/* RENDER TABLE */
function renderTable() {

    const COLS = 6;

    let html = "<table>";

    html += "<tr>";
    for (let i = 0; i < COLS; i++) {
        html += `<th>${headers[i] || ""}</th>`;
    }
    html += "</tr>";

    for (let i = 0; i < tableData.length; i++) {

        const sheetRow = i + 2;

        html += "<tr>";

        for (let j = 0; j < COLS; j++) {

            const value = tableData[i][j] ?? "";

            html += `
                <td contenteditable="true"
                    onblur="saveCell(${sheetRow}, ${j + 1}, this.innerText)">
                    ${value}
                </td>`;
        }

        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("table-container").innerHTML = html;
}


/* SAVE CELL */
function saveCell(row, col, value) {

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            sheet: SHEET_NAME,
            action: "update",
            row: row,
            col: col,
            value: value,
            key: "fLimclub"
        })
    });
}

</script>

</body>
</html>
