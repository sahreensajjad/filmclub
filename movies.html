<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Movie List</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="suggest.html">Suggest</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<section class="row">

  <div class="movie-header">
    <h2>Movie List Editor</h2>

    <button onclick="addRow()">➕ Add Row</button>
    <button onclick="downloadCSV()">Download CSV</button>
  </div>

  <div id="table-container">Loading...</div>

</section>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxHQxuQV-kCOEKEJd4JdeOcgHRUfJfdwGC5fSzV0OcUHk7fbfnzOjHkjzFuNUGsQ1Bc/exec";

let tableData = [];
let headers = [];

// ---------------- LOAD DATA ----------------
fetch(API_URL)
.then(res => res.json())
.then(data => {

    headers = data[0];
    tableData = data.slice(1);

    renderTable();
});


// ---------------- RENDER TABLE ----------------
function renderTable() {

    let html = `<table>`;

    // headers
    html += `<tr>`;
    headers.forEach(h => html += `<th>${h}</th>`);
    html += `</tr>`;

    // rows
    tableData.forEach((row, i) => {

        html += `<tr>`;

        headers.forEach((_, j) => {

            const value = row[j] ?? "";

            html += `
                <td contenteditable="true"
                    onblur="saveCell(${i}, ${j}, this.innerText)">
                    ${value}
                </td>`;
        });

        html += `</tr>`;
    });

    html += `</table>`;

    document.getElementById("table-container").innerHTML = html;
}


// ---------------- SAVE TO GOOGLE SHEETS ----------------
function saveCell(row, col, value) {

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "text/plain"
        },
        body: JSON.stringify({
            row: row + 1,
            col: col + 1,
            value: value
        })
    });

}


// ---------------- ADD ROW ----------------
function addRow() {

    const newRow = headers.map(() => "");

    tableData.push(newRow);

    renderTable();
}


// ---------------- DOWNLOAD CSV ----------------
function downloadCSV() {

    let csv = headers.join(",") + "\n";

    tableData.forEach(row => {
        csv += row.join(",") + "\n";
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "movie-list.csv";
    a.click();
}

</script>

</body>
</html>
