<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Movie List</title>
</head>
<body>
<header class="nav">
    <h1 class="logo">Fil Club 🎬</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Movie List</a>
        <a href="themes.html">Themes</a>
        <a href="leaderboard.html">Leaderboard</a>
    </nav>
</header>

<!-- KEY PROMPT OVERLAY -->
<div id="key-overlay" style="
    position:fixed; inset:0; background:rgba(0,0,0,0.85);
    display:flex; align-items:center; justify-content:center; z-index:999;">
    <div style="background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:32px; text-align:center; min-width:300px;">
        <h2 style="color:#fff; margin:0 0 8px;">Enter Edit Key</h2>
        <p style="color:#888; margin:0 0 20px; font-size:14px;">Required to make changes to the sheet</p>
        <input id="key-input" type="password" placeholder="Enter key..."
            style="width:100%; padding:10px; border-radius:4px; border:1px solid #444;
                   background:#111; color:#fff; font-size:16px; box-sizing:border-box; margin-bottom:12px;"
            onkeydown="if(event.key==='Enter') submitKey()">
        <button onclick="submitKey()" style="
            width:100%; padding:10px; background:#e50914; color:#fff;
            border:none; border-radius:4px; font-size:16px; cursor:pointer;">
            Unlock
        </button>
        <p id="key-error" style="color:#e50914; margin:10px 0 0; font-size:13px; display:none;">Incorrect key, try again.</p>
    </div>
</div>

<section class="row">
    <div class="movie-header">
        <h2>Movie List</h2>
    </div>
    <div id="table-container">Loading...</div>
</section>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyi8gzf6WY_BrCIQhd0DOM0qwPP17MjEe2V1BaVxidpo5EvMqgLWjkK38MLFX6zkiFF/exec";
const SHEET_NAME = "Movie List";
const COLS = 6;

let WRITE_KEY = null;
let headers = [];
let tableData = [];
let nextSheetRow = 2;

/* ---------------- KEY ---------------- */
function submitKey() {
    const input = document.getElementById("key-input").value.trim();
    if (!input) return;

    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ sheet: SHEET_NAME, action: "verify", key: input })
    })
    .then(r => r.text())
    .then(text => {
        try {
            const res = JSON.parse(text);
            if (res.error === "Unauthorized") {
                document.getElementById("key-error").style.display = "block";
                return;
            }
        } catch(e) {}

        WRITE_KEY = input;
        document.getElementById("key-overlay").style.display = "none";
    })
    .catch(() => {
        WRITE_KEY = input;
        document.getElementById("key-overlay").style.display = "none";
    });
}

/* ---------------- LOAD + REFRESH ---------------- */
function loadData() {
    fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_NAME))
    .then(r => r.json())
    .then(data => {

        if (Array.isArray(data)) {
            headers = data[0] || [];
            tableData = data.slice(1);
        } else if (data.headers && data.rows) {
            headers = data.headers;
            tableData = data.rows;
        }

        while (tableData.length > 0) {
            const last = tableData[tableData.length - 1];
            if (last.every(c => c === "" || c === null || String(c).trim() === "")) {
                tableData.pop();
            } else break;
        }

        nextSheetRow = tableData.length + 2;
        renderTable();
    });
}

/* 🔄 NEAR REAL TIME SYNC */
function refreshData() {
    fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_NAME))
    .then(r => r.json())
    .then(data => {

        let newHeaders = [];
        let newTableData = [];

        if (Array.isArray(data)) {
            newHeaders = data[0] || [];
            newTableData = data.slice(1);
        } else if (data.headers && data.rows) {
            newHeaders = data.headers;
            newTableData = data.rows;
        }

        if (JSON.stringify(newTableData) !== JSON.stringify(tableData)) {
            tableData = newTableData;
            headers = newHeaders;
            renderTable();
        }
    });
}

/* ---------------- RENDER ---------------- */
function renderTable() {
    let html = "<table><tr>";

    for (let i = 0; i < COLS; i++) {
        html += `<th>${headers[i] || ""}</th>`;
    }

    html += "</tr>";

    for (let i = 0; i < tableData.length; i++) {
        const sheetRow = i + 2;

        html += `<tr data-sheet-row="${sheetRow}">`;

        for (let j = 0; j < COLS; j++) {
            const value = tableData[i][j] ?? "";
            html += `<td contenteditable="true">${value}</td>`;
        }

        html += "</tr>";
    }

    html += buildGhostRow();
    html += "</table>";

    const container = document.getElementById("table-container");
    container.innerHTML = html;

    container.querySelectorAll("tr[data-sheet-row]").forEach(row => {
        row.querySelectorAll("td").forEach((td, j) => {
            td.addEventListener("blur", () => {
                const r = parseInt(row.dataset.sheetRow);
                const c = j + 1;
                const v = td.innerText.trim();
                saveCell(r, c, v); // allows delete = empty
            });
        });
    });

    attachGhostListeners(container.querySelector("tr.ghost-row"));
}

/* ---------------- GHOST ROW ---------------- */
function buildGhostRow() {
    return `<tr class="ghost-row">${
        Array(COLS).fill(`<td contenteditable="true"></td>`).join("")
    }</tr>`;
}

function attachGhostListeners(ghostRow) {
    if (!ghostRow) return;

    let promoted = false;
    let sheetRow = null;
    let rowReady = false;

    ghostRow.querySelectorAll("td").forEach((td, j) => {
        td.addEventListener("input", () => {
            if (promoted) return;

            promoted = true;
            sheetRow = nextSheetRow++;

            ghostRow.classList.remove("ghost-row");
            ghostRow.dataset.sheetRow = sheetRow;

            const newGhost = document.createElement("tr");
            newGhost.classList.add("ghost-row");
            newGhost.innerHTML = Array(COLS).fill(`<td contenteditable="true"></td>`).join("");
            ghostRow.closest("table").appendChild(newGhost);

            attachGhostListeners(newGhost);

            postToSheet({
                sheet: SHEET_NAME,
                action: "addRow",
                key: WRITE_KEY
            }).then(() => {
                rowReady = true;
            });
        });

        td.addEventListener("blur", () => {
            if (!promoted || !sheetRow) return;

            const value = td.innerText.trim();
            const col = j;

            if (rowReady) {
                saveCell(sheetRow, col, value);
            }
        });
    });
}

/* ---------------- SAVE ---------------- */
function saveCell(row, col, value) {
    postToSheet({
        sheet: SHEET_NAME,
        action: "update",
        row,
        col,
        value,
        key: WRITE_KEY
    });
}

/* ---------------- POST ---------------- */
function postToSheet(body) {
    return fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(body)
    })
    .then(r => r.text());
}

/* ---------------- START ---------------- */
loadData();
setInterval(refreshData, 3000); // 🔥 near real-time sync every 3 sec
</script>

</body>
</html>
