<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Movie List</title>
</head>
<body>
<header class="nav">
    <h1 class="logo">MovieClub</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Movie List</a>
        <a href="themes.html">Themes</a>
        <a href="leaderboard.html">Leaderboard</a>
    </nav>
</header>
<section class="row">
    <div class="movie-header">
        <h2>Movie List Editor</h2>
    </div>
    <div id="table-container">Loading...</div>
</section>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyB0ggaTr5iGYZhTZ59YcFXuu6WZTfyNjfd7BE69-WD_zP3qX3MIvLq6MVhpnYV5GtX/exec";
const SHEET_NAME = "Movie List";
const WRITE_KEY = "fLimclub";
const COLS = 6;
let headers = [];
let tableData = [];

/* LOAD DATA */
fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_NAME))
    .then(r => r.json())
    .then(data => {
        // ✅ Handle the { headers, rows } response shape from your Apps Script
        headers = data.headers || [];
        tableData = data.rows || [];
        renderTable();
    });

/* RENDER TABLE */
function renderTable() {
    const container = document.getElementById("table-container");

    let html = "<table><tr>";
    for (let i = 0; i < COLS; i++) {
        html += `<th>${headers[i] || ""}</th>`;
    }
    html += "</tr>";

    for (let i = 0; i < tableData.length; i++) {
        html += buildRow(i, i + 2);
    }

    html += buildGhostRow();
    html += "</table>";
    container.innerHTML = html;
}

/* BUILD A DATA ROW */
function buildRow(dataIndex, sheetRow) {
    let html = "<tr>";
    for (let j = 0; j < COLS; j++) {
        const value = tableData[dataIndex]?.[j] ?? "";
        html += `<td contenteditable="true"
            onblur="saveCell(${sheetRow}, ${j + 1}, this.innerText)">${value}</td>`;
    }
    return html + "</tr>";
}

/* BUILD THE EMPTY GHOST ROW */
function buildGhostRow() {
    return `<tr class="ghost-row">${
        Array(COLS).fill(0).map(() =>
            `<td contenteditable="true" oninput="onGhostInput(this)"></td>`
        ).join("")
    }</tr>`;
}

/* CALLED WHEN USER TYPES INTO THE GHOST ROW */
function onGhostInput(cell) {
    const ghostRow = cell.closest("tr");
    ghostRow.classList.remove("ghost-row");

    const newSheetRow = tableData.length + 2;
    tableData.push(Array(COLS).fill(""));

    // Re-wire cells with save handlers
    ghostRow.querySelectorAll("td").forEach((td, j) => {
        td.removeAttribute("oninput");
        td.setAttribute("onblur", `saveCell(${newSheetRow}, ${j + 1}, this.innerText)`);
    });

    // Append a fresh ghost row
    const newGhost = document.createElement("tr");
    newGhost.classList.add("ghost-row");
    newGhost.innerHTML = Array(COLS).fill(0).map(() =>
        `<td contenteditable="true" oninput="onGhostInput(this)"></td>`
    ).join("");
    ghostRow.closest("table").appendChild(newGhost);

    // ✅ Include key so doPost authorises the addRow
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sheet: SHEET_NAME, action: "addRow", key: WRITE_KEY })
    }).catch(err => console.error(err));
}

/* SAVE CELL */
function saveCell(row, col, value) {
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            sheet: SHEET_NAME,
            action: "update",
            row: row,
            col: col,
            value: value,
            key: WRITE_KEY
        })
    });
}
</script>
</body>
</html>
