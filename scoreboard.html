<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Movie Scoreboard</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="scoreboard.html">Scoreboard</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<section class="row">

  <div class="movie-header">
    <h2>Movie Scoreboard</h2>

    <button onclick="addRow()">➕ Add Row</button>
    <button onclick="reload()">Refresh</button>
  </div>

  <div id="table-container">Loading...</div>

</section>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxHQxuQV-kCOEKEJd4JdeOcgHRUfJfdwGC5fSzV0OcUHk7fbfnzOjHkjzFuNUGsQ1Bc/exec";

const SHEET_NAME = "Movie Scoreboard";

let headers = [];
let tableData = [];

load();

function load() {

  fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_NAME))
  .then(r => r.json())
  .then(data => {

    headers = data[0];
    tableData = data.slice(1);

    render();
  });
}

function render() {

  let html = "<table>";

  html += "<tr>";
  headers.forEach(h => html += `<th>${h}</th>`);
  html += "</tr>";

  tableData.forEach((row, i) => {

    html += "<tr>";

    headers.forEach((_, j) => {

      const val = row[j] ?? "";

      html += `
        <td contenteditable="true"
            onblur="save(${i},${j},this.innerText)">
            ${val}
        </td>`;
    });

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("table-container").innerHTML = html;
}

function save(row, col, value) {

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      sheet: SHEET_NAME,
      action: "update",
      row: row + 1,
      col: col + 1,
      value: value
    })
  });
}

function addRow() {

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      sheet: SHEET_NAME,
      action: "addRow"
    })
  }).then(() => load());
}

function reload() {
  load();
}

</script>

</body>
</html>
