<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Movie Scoreboard</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="scoreboard.html">Scoreboard</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<section class="row">

  <h2>🎬 Movie Scoreboard</h2>
  <div id="board">Loading...</div>

</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxHQxuQV-kCOEKEJd4JdeOcgHRUfJfdwGC5fSzV0OcUHk7fbfnzOjHkjzFuNUGsQ1Bc/exec";
const SHEET = "Movie Scoreboard";

let headers = [];
let rows = [];

load();

function load() {
  fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET))
    .then(r => r.json())
    .then(data => {

      headers = data[0];
      rows = data.slice(1);

      render();
    });
}

function render() {

  const movieCol = 0;
  const posterCol = -1; // optional if you don't have posters yet

  let html = "<div class='grid'>";

  rows.forEach((row, i) => {

    const movie = row[0];
    const suggestedBy = row[1];
    const average = row[row.length - 1];

    if (!movie) return;

    html += `
      <div class="card" style="min-height: 220px">

        <img src="https://source.unsplash.com/300x400/?movie,${encodeURIComponent(movie)}"
             alt="${movie}">

        <strong contenteditable="true"
          onblur="save(${i},0,this.innerText)">${movie}</strong>

        <small>Suggested by:
          <span contenteditable="true"
            onblur="save(${i},1,this.innerText)">${suggestedBy || ""}</span>
        </small>

        <small>⭐ Average: ${average || "N/A"}</small>

      </div>
    `;
  });

  html += "</div>";

  document.getElementById("board").innerHTML = html;
}

function save(row, col, value) {

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      sheet: SHEET,
      action: "update",
      row: row + 2,
      col: col + 1,
      value: value
    })
  });

}

</script>

</body>
</html>
