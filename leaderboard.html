<h1 style="padding:20px;">Leaderboard</h1>

<div class="grid" id="board"></div>

<script>
const SHEET_URL = "PASTE_LEADERBOARD_CSV";

fetch(SHEET_URL)
.then(r => r.text())
.then(t => {
    const rows = t.trim().split("\n").slice(1);

    let html = "";
    rows.forEach(r => {
        const c = r.split(",");
        html += `
        <div class="card">
            ${c[0]}<br>
            ⭐ ${c[1]}
        </div>`;
    });

    document.getElementById("board").innerHTML = html;
});
</script>

</body>
