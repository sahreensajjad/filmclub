<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>MovieClub</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="suggest.html">Suggest</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<!-- THEMES -->
<section class="row">
  <h2>Monthly Themes</h2>
  <div class="grid" id="themes">Loading...</div>
</section>

<!-- TOP RATED -->
<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top">Loading...</div>
</section>

<!-- HALL OF SHAME -->
<section class="row">
  <h2>Hall of Shame</h2>
  <div class="grid" id="shame">Loading...</div>
</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxBjanagp0ZfI6Wch1iPLiyfg25L2ZXCHNXgNG0xKm5G10TR-2btX1YSm0-Qisi7xVr/exec";

const SHEET_MOVIE_LIST = "Movie List";
const SHEET_SCOREBOARD = "Movie Scoreboard";
const SHEET_CURRENT = "Current Selections";

/* ---------------- NOW SHOWING ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_CURRENT))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    const last = rows[rows.length - 1];

    if (!last) {
        document.getElementById("current").innerText = "No data";
        return;
    }

    const colA = last[0];
    const colB = last[1];

    document.getElementById("current").innerText =
        colA && colB ? colA + " and " + colB : (colA || colB || "");
});


/* ---------------- THEMES ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_CURRENT))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    let html = "";

    rows.forEach(r => {

        const theme = r[0];
        const movie = r[1];

        if (!theme && !movie) return;

        html += `
        <div class="card">
          <strong>${theme || ""}</strong>
          <small>${movie || ""}</small>
        </div>`;
    });

    document.getElementById("themes").innerHTML = html;
});


/* ---------------- TOP RATED ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_SCOREBOARD))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    rows.sort((a, b) =>
        parseFloat(b[b.length - 1] || 0) - parseFloat(a[a.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("top").innerHTML = html;
});


/* ---------------- HALL OF SHAME ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent(SHEET_SCOREBOARD))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    rows.sort((a, b) =>
        parseFloat(a[a.length - 1] || 0) - parseFloat(b[b.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
