<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>MovieClub</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="suggest.html">Suggest</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<!-- THEMES -->
<section class="row">
  <h2>Monthly Themes</h2>
  <div class="grid" id="themes"></div>
</section>

<!-- TOP RATED -->
<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top"></div>
</section>

<!-- HALL OF SHAME -->
<section class="row">
  <h2>Hall of Shame</h2>
  <div class="grid" id="shame"></div>
</section>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyB0ggaTr5iGYZhTZ59YcFXuu6WZTfyNjfd7BE69-WD_zP3qX3MIvLq6MVhpnYV5GtX/exec";


/* ---------------- NOW SHOWING ---------------- */

fetch(API_URL + "?sheet=Current%20Selections")
.then(r => r.json())
.then(data => {

    const rows = data.slice(1);

    if (!rows.length) return;

    const last = rows[rows.length - 1];

    const colC = last[2];
    const colD = last[3];

    let text = "";

    if (colC && colD) text = colC + " and " + colD;
    else text = colC || colD || "";

    document.getElementById("current").innerText = text;
});


/* ---------------- THEMES ---------------- */

fetch(API_URL + "?sheet=Movie%20List")
.then(r => r.json())
.then(data => {

    const rows = data.slice(1);

    let html = "";

    rows.forEach(r => {

        const theme = r[0];
        const movie = r[1];

        if (!theme && !movie) return;

        html += `
        <div class="card">
          <strong>${theme || "Theme"}</strong>
          <small>${movie || ""}</small>
        </div>`;
    });

    document.getElementById("themes").innerHTML = html;
});


/* ---------------- TOP RATED ---------------- */

fetch(API_URL + "?sheet=Movie%20Scoreboard")
.then(r => r.json())
.then(data => {

    const rows = data.slice(1);

    rows.sort((a, b) =>
        parseFloat(b[b.length - 1] || 0) - parseFloat(a[a.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("top").innerHTML = html;
});


/* ---------------- HALL OF SHAME ---------------- */

fetch(API_URL + "?sheet=Movie%20Scoreboard")
.then(r => r.json())
.then(data => {

    const rows = data.slice(1);

    rows.sort((a, b) =>
        parseFloat(a[a.length - 1] || 0) - parseFloat(b[b.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
