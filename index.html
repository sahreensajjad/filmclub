<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Film Club</title>

<style>
.card {
    position: relative;
    overflow: hidden;
}

.roast-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px;
    opacity: 0;
    transition: 0.2s ease;
    font-size: 14px;
    border-radius: 10px;
}

.card:hover .roast-overlay {
    opacity: 1;
}
</style>

</head>

<body>

<header class="nav">
  <h1 class="logo">Film Club🎬</h1>
  <nav>
        <a href="index.html">Home</a>
        <a href="movies.html">Upcoming Fails</a>
        <a href="discover.html">Discover</a>
        <a href="leaderboard.html">Accountability Board</a>
        <a href="archive">It Made Sense at the Time</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<section class="row">
  <h2>Monthly Themes</h2>
  <div id="themes"></div>
</section>

<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top"></div>
</section>

<section class="row">
  <h2>Hall of Shame</h2>
  <div class="grid" id="shame"></div>
</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxUysWGi4OIOdiuuGi8pk7OUEBFJCkXaItY9bRHpbgRlLFs3EMGJozvYXEQr6ZoEpdM/exec";
const OMDB_KEY = "f4f91679";

/* ---------------- NOW SHOWING ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    if (!rows.length) {
        document.getElementById("current").innerText = "No data";
        return;
    }

    const last = rows[rows.length - 1];
    const prev = rows[rows.length - 2];

    const lastTheme = last[1];
    const lastMovie = last[2];

    const prevTheme = prev ? prev[1] : null;
    const prevMovie = prev ? prev[2] : null;

    let output = "";

    if (prev && lastTheme === prevTheme) {
        output = `${prevMovie} and ${lastMovie}`;
    } else {
        output = lastMovie;
    }

    document.getElementById("current").innerText = output;
});


/* ---------------- MONTHLY THEMES ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(async data => {

    const rows = data.rows || [];
    const container = document.getElementById("themes");

    let html = "";
    const cache = {};

    const IMDB_COL = 3; // adjust if needed

    const manualPosters = {
        "I'm Not a Robot": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdDmYqyUoZkMQ9I1NsLB8SOeObCYRtPpiNog&s",
        "Love Death & Robots": "https://m.media-amazon.com/images/M/MV5BMDQxMzIzN2ItYzYzOC00Zjc3LTkyZGEtOTcyZGY5OWEyZTQ5XkEyXkFqcGc@._V1_.jpg"
    };

    for (let i = 0; i < rows.length; i++) {

        const r = rows[i];

        const month = r[0];
        const theme = r[1];
        const movie = r[2];
        const imdbRef = (r[IMDB_COL] || "").trim();

        if (month === "Month" && theme === "Theme" && movie === "Voted movies") continue;
        if (!theme || !movie) continue;

        let poster = cache[movie];
        let imdbID = "";

        if (manualPosters[movie]) {
            poster = manualPosters[movie];
        }

        if (!poster) {
            try {

                let omdb;

                if (imdbRef) {
                    omdb = await fetch(
                        `https://www.omdbapi.com/?i=${encodeURIComponent(imdbRef)}&apikey=${OMDB_KEY}`
                    ).then(r => r.json());
                } else {
                    omdb = await fetch(
                        `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=${OMDB_KEY}`
                    ).then(r => r.json());
                }

                poster = (omdb.Poster && omdb.Poster !== "N/A") ? omdb.Poster : "";
                imdbID = omdb.imdbID || "";
                cache[movie] = poster;

            } catch (e) {
                poster = "";
            }
        }

        const imdbUrl = imdbID
            ? `https://www.imdb.com/title/${imdbID}/`
            : `https://www.imdb.com/find?q=${encodeURIComponent(movie)}`;

        html += `
        <a href="${imdbUrl}" target="_blank" style="text-decoration:none;color:inherit;">
            <div class="theme-card">
                <img src="${poster}" alt="${theme}">
                <div class="theme-info">
                    <strong>${theme}</strong>
                </div>
            </div>
        </a>`;
    }

    container.innerHTML = html;
});


/* ---------------- TOP RATED + ROAST SYSTEM ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(async data => {

    const rows = data.rows || [];
    const container = document.getElementById("top");

    const MOVIE = 0;
    const IMDB_COL = 1; // adjust if needed
    const AVG = 24;

    const cache = {};

    const clean = rows
        .slice(1)
        .filter(r => r[MOVIE] && r[AVG] !== "" && r[AVG] !== undefined)
        .sort((a, b) => parseFloat(b[AVG]) - parseFloat(a[AVG]));

    let html = "";

    for (const r of clean) {

        const movie = r[MOVIE];
        const imdbRef = (r[IMDB_COL] || "").trim();
        const avg = parseFloat(r[AVG]);

        let poster = cache[movie];
        let imdbID = "";

        if (!poster) {
            try {

                let omdb;

                if (imdbRef) {
                    omdb = await fetch(
                        `https://www.omdbapi.com/?i=${encodeURIComponent(imdbRef)}&apikey=${OMDB_KEY}`
                    ).then(r => r.json());
                } else {
                    omdb = await fetch(
                        `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=${OMDB_KEY}`
                    ).then(r => r.json());
                }

                poster = (omdb.Poster && omdb.Poster !== "N/A") ? omdb.Poster : "";
                imdbID = omdb.imdbID || imdbRef || "";
                cache[movie] = poster;

            } catch (e) {
                poster = "";
            }
        }

        const imdbUrl = imdbID
            ? `https://www.imdb.com/title/${imdbID}/`
            : `https://www.imdb.com/find?q=${encodeURIComponent(movie)}`;

        let roast = "";

        if (avg >= 9.2) roast = "Cinema. We may never recover from this.";
        else if (avg >= 9.0) roast = "Basically flawless. Annoyingly good.";
        else if (avg >= 8.5) roast = "Elite territory. Someone had taste.";
        else if (avg >= 8.0) roast = "Solid. No notes.";
        else if (avg >= 7.5) roast = "Pretty decent watch.";
        else if (avg >= 7.0) roast = "It exists.";
        else if (avg >= 6.5) roast = "Regret is part of the experience.";
        else if (avg >= 6.0) roast = "We should apologise to ourselves";
        else if (avg >= 5.5) roast = "Why God Why?";
        else if (avg >= 5.0) roast = "This was almost impressive in a bad way.";
        else roast = "Self-harm";

        html += `
        <a href="${imdbUrl}" target="_blank" style="text-decoration:none;color:inherit;">
            <div class="card">
                <img src="${poster}" alt="${movie}">
                <strong>${movie}</strong>
                <small>⭐ ${avg}</small>

                <div class="roast-overlay">
                    ${roast}
                </div>
            </div>
        </a>`;
    }

    container.innerHTML = html;
});


/* ---------------- HALL OF SHAME ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    const processed = (function(rows) {

        const NAME = 1;
        const AVG = 24;

        const map = {};

        for (let i = 1; i < rows.length; i++) {

            const r = rows[i];

            const name = r[NAME];
            const score = parseFloat(r[AVG]);

            if (!name || isNaN(score)) continue;

            if (!map[name]) {
                map[name] = { total: 0, count: 0 };
            }

            map[name].total += score;
            map[name].count += 1;
        }

        return Object.entries(map).map(([name, obj]) => ({
            name,
            avg: obj.total / obj.count
        }));

    })(rows).sort((a, b) => a.avg - b.avg);

    let html = "";

    processed.forEach(r => {

        html += `
        <div class="card">
            <strong>${r.name}</strong>
            <small>⭐ ${r.avg.toFixed(2)}</small>
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
