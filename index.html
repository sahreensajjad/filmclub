<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>MovieClub</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="suggest.html">Suggest</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="hall-of-shame.html">Hall of Shame</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<!-- THEMES -->
<section class="row">
  <h2>This Month’s Themes</h2>
  <div class="grid" id="themes"></div>
</section>

<!-- TOP RATED -->
<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top"></div>
</section>

<!-- HALL OF SHAME PREVIEW -->
<section class="row">
  <h2>Hall of Shame 😈</h2>
  <div class="grid" id="shame"></div>
</section>

<script>

const CURRENT =
"https://docs.google.com/spreadsheets/d/13lWytzXH2oiIezzaSU_EmaNF6QqLWm3ym-qIdpdYGeY/export?format=csv&gid=0";

const MOVIES =
"https://docs.google.com/spreadsheets/d/13lWytzXH2oiIezzaSU_EmaNF6QqLWm3ym-qIdpdYGeY/export?format=csv&gid=1021935769";

const SCORE =
"https://docs.google.com/spreadsheets/d/13lWytzXH2oiIezzaSU_EmaNF6QqLWm3ym-qIdpdYGeY/export?format=csv&gid=1069437142";


// ---------------- CURRENT + THEMES ----------------
fetch(CURRENT)
.then(r => r.text())
.then(t => {
    const rows = t.trim().split("\n");

    const latest = rows[1].split(",");
    document.getElementById("current").innerText =
        latest[2] + " vs " + latest[3];

    let html = "";

    rows.slice(1).forEach(r => {
        const c = r.split(",");
        html += `
        <div class="card">
            <strong>${c[1]}</strong><br>
            <small>${c[0]}</small>
        </div>`;
    });

    document.getElementById("themes").innerHTML = html;
});


// ---------------- TOP RATED ----------------
fetch(SCORE)
.then(r => r.text())
.then(t => {
    const rows = t.trim().split("\n").slice(1);

    let html = "";

    rows.forEach(r => {
        const c = r.split(",");
        html += `
        <div class="card">
            <strong>${c[0]}</strong><br>
            ⭐ ${c[c.length - 1]}
        </div>`;
    });

    document.getElementById("top").innerHTML = html;
});


// ---------------- HALL OF SHAME PREVIEW ----------------
fetch(SCORE)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    const userStats = {};

    rows.forEach(r => {
        const c = r.split(",");
        const user = c[1]?.trim();
        const avg = parseFloat(c[c.length - 1]);

        if (!user || isNaN(avg)) return;

        if (!userStats[user]) {
            userStats[user] = { total: 0, count: 0 };
        }

        userStats[user].total += avg;
        userStats[user].count += 1;
    });

    const leaderboard = Object.keys(userStats).map(u => ({
        name: u,
        avg: userStats[u].total / userStats[u].count
    }));

    leaderboard.sort((a, b) => a.avg - b.avg);

    let html = "";

    leaderboard.slice(0, 5).forEach(u => {
        html += `
        <div class="card">
            <strong>${u.name}</strong><br>
            😈 ${u.avg.toFixed(2)}
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
