<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>MovieClub</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="suggest.html">Suggest</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<!-- THEMES -->
<section class="row">
  <h2>Monthly Themes</h2>
  <div id="themes"></div>
</section>

<!-- TOP RATED -->
<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top"></div>
</section>

<!-- HALL OF SHAME -->
<section class="row">
  <h2>Hall of Shame</h2>
  <div class="grid" id="shame"></div>
</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxUysWGi4OIOdiuuGi8pk7OUEBFJCkXaItY9bRHpbgRlLFs3EMGJozvYXEQr6ZoEpdM/exec";
const OMDB_KEY = "2e340492";

/* ---------------- NOW SHOWING ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    if (!rows.length) {
        document.getElementById("current").innerText = "No data";
        return;
    }

    const last = rows[rows.length - 1];
    const prev = rows[rows.length - 2];

    const lastTheme = last[1];
    const lastMovie = last[2];

    const prevTheme = prev ? prev[1] : null;
    const prevMovie = prev ? prev[2] : null;

    let output = "";

    if (prev && lastTheme === prevTheme) {
        output = `${prevMovie} and ${lastMovie}`;
    } else {
        output = lastMovie;
    }

    document.getElementById("current").innerText = output;
});


/* ---------------- THEMES (FULL POSTER CARDS) ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(async data => {

    const rows = data.rows || [];
    const container = document.getElementById("themes");

    let html = "";

    for (const r of rows) {

        const theme = r[1];
        const movie = r[2];

        if (!theme || !movie) continue;

        let poster = "";

        try {
            const omdb = await fetch(
                `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=${OMDB_KEY}`
            ).then(r => r.json());

            poster = (omdb.Poster && omdb.Poster !== "N/A") ? omdb.Poster : "";

        } catch (e) {
            poster = "";
        }

        html += `
        <div class="theme-card">
            <img src="${poster}" alt="${movie}">
            <div class="theme-overlay">
                <strong>${theme}</strong>
                <small>${movie}</small>
            </div>
        </div>`;
    }

    container.innerHTML = html;
});


/* ---------------- TOP RATED ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    rows.sort((a, b) =>
        parseFloat(b[b.length - 1] || 0) - parseFloat(a[a.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("top").innerHTML = html;
});


/* ---------------- HALL OF SHAME ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    rows.sort((a, b) =>
        parseFloat(a[a.length - 1] || 0) - parseFloat(b[b.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
