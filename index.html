<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>MovieClub</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="suggest.html">Suggest</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<section class="row">
  <h2>Monthly Themes</h2>
  <div class="grid" id="themes">Loading...</div>
</section>

<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top">Loading...</div>
</section>

<section class="row">
  <h2>Hall of Shame</h2>
  <div class="grid" id="shame">Loading...</div>
</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxUysWGi4OIOdiuuGi8pk7OUEBFJCkXaItY9bRHpbgRlLFs3EMGJozvYXEQr6ZoEpdM/exec";
const OMDB_KEY = "2e340492";

/* ---------------- NOW SHOWING ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    const last = rows[rows.length - 1];

    if (!last) {
        document.getElementById("current").innerText = "No data";
        return;
    }

    const a = last[0];
    const b = last[1];

    document.getElementById("current").innerText =
        a && b ? a + " and " + b : (a || b || "");
});


/* ---------------- MONTHLY THEMES + POSTERS ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(async data => {

    const rows = data.rows || [];
    const container = document.getElementById("themes");

    let html = "";
    const posterCache = {};

    for (const r of rows) {

        const theme = r[1];
        const movies = r.slice(2).filter(Boolean);

        if (!theme) continue;

        let postersHTML = "";

        for (const movie of movies) {

            let poster = posterCache[movie];

            if (!poster) {
                try {
                    const res = await fetch(
                        `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=${OMDB_KEY}`
                    );
                    const omdb = await res.json();

                    poster = (omdb.Poster && omdb.Poster !== "N/A")
                        ? omdb.Poster
                        : "";

                    posterCache[movie] = poster;

                } catch (e) {
                    poster = "";
                }
            }

            postersHTML += `
                <div class="poster">
                    ${poster ? `<img src="${poster}" alt="${movie}">` : ""}
                    <small>${movie}</small>
                </div>
            `;
        }

        html += `
        <div class="card">
            <strong>${theme}</strong>
            <div class="poster-row">
                ${postersHTML}
            </div>
        </div>`;
    }

    container.innerHTML = html;
});


/* ---------------- TOP RATED ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    rows.sort((a, b) =>
        parseFloat(b[b.length - 1] || 0) - parseFloat(a[a.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("top").innerHTML = html;
});


/* ---------------- HALL OF SHAME ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    rows.sort((a, b) =>
        parseFloat(a[a.length - 1] || 0) - parseFloat(b[b.length - 1] || 0)
    );

    let html = "";

    rows.forEach(r => {

        const movie = r[1];
        const avg = r[r.length - 1];

        if (!movie) return;

        html += `
        <div class="card">
          <strong>${movie}</strong>
          <small>⭐ ${avg || "N/A"}</small>
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
