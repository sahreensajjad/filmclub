<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>MovieClub</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">MovieClub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="suggest.html">Suggest</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="hall-of-shame.html">Hall of Shame</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<section class="row">
  <h2>This Month’s Themes</h2>
  <div class="grid" id="themes"></div>
</section>

<section class="row">
  <h2>Movie Posters</h2>
  <div class="grid" id="movies"></div>
</section>

<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top"></div>
</section>

<section class="row">
  <h2>Hall of Shame 😈</h2>
  <div class="grid" id="shame"></div>
</section>

<script>

const API_KEY = "2e340492";

const CURRENT =
"https://docs.google.com/spreadsheets/d/13lWytzXH2oiIezzaSU_EmaNF6QqLWm3ym-qIdpdYGeY/export?format=csv&gid=0";

const MOVIES =
"https://docs.google.com/spreadsheets/d/13lWytzXH2oiIezzaSU_EmaNF6QqLWm3ym-qIdpdYGeY/export?format=csv&gid=1021935769";

const SCORE =
"https://docs.google.com/spreadsheets/d/13lWytzXH2oiIezzaSU_EmaNF6QqLWm3ym-qIdpdYGeY/export?format=csv&gid=1069437142";


// ---------------- OMDb loader ----------------
function loadMovie(title, containerId) {

    fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}&apikey=${API_KEY}`)
    .then(r => r.json())
    .then(data => {

        if (data.Response === "False") return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
    <img src="${poster}">
    <strong>${data.Title}</strong>
    <small class="card-rating">⭐ ${data.imdbRating}</small>
`;

        document.getElementById(containerId).appendChild(card);
    });
}


// ---------------- CURRENT ----------------
fetch(CURRENT)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n");

    const latest = rows[1].split(",");
    document.getElementById("current").innerText =
        latest[2] + " vs " + latest[3];

    let html = "";

    rows.slice(1).forEach(r => {
        const c = r.split(",");
        html += `
        <div class="card">
            <strong>${c[1]}</strong><br>
            <small>${c[0]}</small>
        </div>`;
    });

    document.getElementById("themes").innerHTML = html;
});


// ---------------- MOVIES (POSTERS) ----------------
fetch(MOVIES)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    rows.forEach(r => {
        const c = r.split(",");
        const title = c[0];
        loadMovie(title, "movies");
    });
});


// ---------------- TOP RATED ----------------
fetch(SCORE)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    let html = "";

    rows.forEach(r => {
        const c = r.split(",");

        html += `
        <div class="card">
            <strong>${c[0]}</strong><br>
            ⭐ ${c[c.length - 1]}
        </div>`;
    });

    document.getElementById("top").innerHTML = html;
});


// ---------------- HALL OF SHAME ----------------
fetch(SCORE)
.then(r => r.text())
.then(t => {

    const rows = t.trim().split("\n").slice(1);

    const users = {};

    rows.forEach(r => {
        const c = r.split(",");
        const u = c[1]?.trim();
        const avg = parseFloat(c[c.length - 1]);

        if (!u || isNaN(avg)) return;

        if (!users[u]) users[u] = { total:0, count:0 };

        users[u].total += avg;
        users[u].count += 1;
    });

    const arr = Object.keys(users).map(u => ({
        name: u,
        avg: users[u].total / users[u].count
    }));

    arr.sort((a,b) => a.avg - b.avg);

    let html = "";

    arr.slice(0,5).forEach(u => {
        html += `
        <div class="card">
            <strong>${u.name}</strong><br>
            😈 ${u.avg.toFixed(2)}
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
