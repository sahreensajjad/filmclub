<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Film Club</title>
</head>

<body>

<header class="nav">
  <h1 class="logo">Film Club🎬</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="movies.html">Movie List</a>
    <a href="themes.html">Themes</a>
    <a href="leaderboard.html">Leaderboard</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h2>Now Showing</h2>
    <h1 id="current">Loading...</h1>
  </div>
</section>

<!-- THEMES -->
<section class="row">
  <h2>Monthly Themes</h2>
  <div id="themes"></div>
</section>

<!-- TOP RATED -->
<section class="row">
  <h2>Top Rated Films</h2>
  <div class="grid" id="top"></div>
</section>

<!-- HALL OF SHAME -->
<section class="row">
  <h2>Hall of Shame</h2>
  <div class="grid" id="shame"></div>
</section>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxUysWGi4OIOdiuuGi8pk7OUEBFJCkXaItY9bRHpbgRlLFs3EMGJozvYXEQr6ZoEpdM/exec";
const OMDB_KEY = "2e340492";

/* ---------------- NOW SHOWING ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    if (!rows.length) {
        document.getElementById("current").innerText = "No data";
        return;
    }

    const last = rows[rows.length - 1];
    const prev = rows[rows.length - 2];

    const lastTheme = last[1];
    const lastMovie = last[2];

    const prevTheme = prev ? prev[1] : null;
    const prevMovie = prev ? prev[2] : null;

    let output = "";

    if (prev && lastTheme === prevTheme) {
        output = `${prevMovie} and ${lastMovie}`;
    } else {
        output = lastMovie;
    }

    document.getElementById("current").innerText = output;
});


/* ---------------- MONTHLY THEMES ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Current Selections"))
.then(r => r.json())
.then(async data => {

    const rows = data.rows || [];
    const container = document.getElementById("themes");

    let html = "";
    const cache = {};

    for (let i = 0; i < rows.length; i++) {

        const r = rows[i];

        const month = r[0];
        const theme = r[1];
        const movie = r[2];

        // skip header row
        if (
            month === "Month" &&
            theme === "Theme" &&
            movie === "Voted movies"
        ) continue;

        if (!theme || !movie) continue;

        let poster = cache[movie];

      const manualPosters = {
          "I'm Not a Robot": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdDmYqyUoZkMQ9I1NsLB8SOeObCYRtPpiNog&s",
          "Love Death & Robots": "https://m.media-amazon.com/images/M/MV5BMDQxMzIzN2ItYzYzOC00Zjc3LTkyZGEtOTcyZGY5OWEyZTQ5XkEyXkFqcGc@._V1_.jpg"
      };
      
      if (manualPosters[movie]) {
          poster = manualPosters[movie];
      }

        if (!poster) {
            try {
                const omdb = await fetch(
                    `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=${OMDB_KEY}`
                ).then(r => r.json());

                poster = (omdb.Poster && omdb.Poster !== "N/A") ? omdb.Poster : "";
                cache[movie] = poster;

            } catch (e) {
                poster = "";
            }
        }

        html += `
        <div class="theme-card">
            <img src="${poster}" alt="${theme}">
            <div class="theme-info">
                <strong>${theme}</strong>
            </div>
        </div>`;
    }

    container.innerHTML = html;
});


/* ---------------- TOP RATED (SORTED HIGH → LOW) ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(async data => {

    const rows = data.rows || [];
    const container = document.getElementById("top");

    const MOVIE = 0; // Column A
    const AVG = 24;  // Column Y

    const cache = {};

    const clean = rows
        .slice(1) // skip header row
        .filter(r => r[MOVIE] && r[AVG] !== "" && r[AVG] !== undefined)
        .sort((a, b) => parseFloat(b[AVG]) - parseFloat(a[AVG])); // DESC

    let html = "";

    for (const r of clean) {

        const movie = r[MOVIE];
        const avg = r[AVG];

        let poster = cache[movie];

        if (!poster) {
            try {
                const omdb = await fetch(
                    `https://www.omdbapi.com/?t=${encodeURIComponent(movie)}&apikey=${OMDB_KEY}`
                ).then(r => r.json());

                poster = (omdb.Poster && omdb.Poster !== "N/A")
                    ? omdb.Poster
                    : "";

                cache[movie] = poster;

            } catch (e) {
                poster = "";
            }
        }

        html += `
        <div class="card">
            <img src="${poster}" alt="${movie}">
            <strong>${movie}</strong>
            <small>⭐ ${avg}</small>
        </div>`;
    }

    container.innerHTML = html;
});


/* ---------------- HALL OF SHAME (UNCHANGED) ---------------- */

fetch(API_URL + "?sheet=" + encodeURIComponent("Movie Scoreboard"))
.then(r => r.json())
.then(data => {

    const rows = data.rows || [];

    const processed = (function(rows) {

        const NAME = 1; // Column B
        const AVG = 24;  // Column Y

        const map = {};

        for (let i = 1; i < rows.length; i++) {

            const r = rows[i];

            const name = r[NAME];
            const score = parseFloat(r[AVG]);

            if (!name || isNaN(score)) continue;

            if (!map[name]) {
                map[name] = { total: 0, count: 0 };
            }

            map[name].total += score;
            map[name].count += 1;
        }

        return Object.entries(map).map(([name, obj]) => ({
            name,
            avg: obj.total / obj.count
        }));

    })(rows).sort((a, b) => a.avg - b.avg);

    let html = "";

    processed.forEach(r => {

        html += `
        <div class="card">
            <strong>${r.name}</strong>
            <small>⭐ ${r.avg.toFixed(2)}</small>
        </div>`;
    });

    document.getElementById("shame").innerHTML = html;
});

</script>

</body>
</html>
